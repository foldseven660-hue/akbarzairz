<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gemini Roleplay - Vercel Edition</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>

    <div class="app-container">
        <!-- Panel Awal: Kustom Karakter -->
        <div class="setup-panel" id="setupPanel">
            <h3>Pengaturan AI Roleplay</h3>
            <p style="font-size: 13px; color: #aaa; text-align: center; margin-bottom: 10px;">
                API Key Anda sudah aman tersimpan di Serverless Env Vercel 🔒
            </p>
            <div class="input-group">
                <label for="systemPrompt">Instruksi Karakter / Core Prompt:</label>
                <textarea id="systemPrompt" rows="5" placeholder="Contoh: Kamu adalah Nadia, siswi SMA galak yang suka menagih uang kas tapi diam-diam naksir user. Tulis tindakan tanpa format, dialog dengan **tebal**, dan bisikan hati di dalam kurung ( )."></textarea>
            </div>
            <button id="saveSetupBtn">Mulai Chat Roleplay</button>
        </div>

        <!-- Tampilan Chat Utama -->
        <div class="chat-interface hidden" id="chatInterface">
            <div class="chat-header">
                <div class="header-left">
                    <div class="avatar">🎭</div>
                    <div class="char-info">
                        <span class="char-name" id="charNameDisplay">Roleplay Partner</span>
                        <span class="char-status">Online</span>
                    </div>
                </div>
                <div class="header-right">
                    <button class="icon-btn" id="wallpaperBtn" title="Ganti Wallpaper Sementara">🖼️</button>
                    <input type="file" id="wallpaperInput" accept="image/*" style="display: none;">
                    <button class="icon-btn" id="toggleSetupBtn" title="Pengaturan">⚙️</button>
                </div>
            </div>

            <div class="chat-messages" id="chatMessages">
                <div class="system-notice">
                    Kirim pesan pertama Anda untuk menginisiasi petunjuk awal roleplay ke AI.
                </div>
            </div>

            <div class="chat-input-bar">
                <button class="action-btn-secondary" id="actionPlusBtn" title="Ganti Wallpaper">+</button>
                <div class="input-wrapper">
                    <textarea id="userInput" placeholder="Ketik pesan atau aksi awal di sini..." rows="1"></textarea>
                </div>
                <button id="sendBtn" class="send-btn">
                    <svg viewBox="0 0 24 24" width="24" height="24">
                        <path fill="currentColor" d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"></path>
                    </svg>
                </button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
